<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Manajemen Toko Buku</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        ul { list-style-type: square; }
    </style>
</head>
<body>
    <h1 id="toko-name">Loading Store...</h1>
    <ul id="book-list"></ul>
    <hr>
    <h3>Input Buku Baru:</h3>
    <input type="text" id="book-input" placeholder="Ketik judul buku...">
    <button onclick="tambahBuku()">Simpan ke Koleksi</button>

    <script>
        // Alamat FQDN Azure
        const API_URL = 'http://20.6.49.160:5000/api';

        function loadData() {
            fetch(`${API_URL}/info`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('toko-name').innerText = data.nama_toko;
                    const list = document.getElementById('book-list');
                    list.innerHTML = "";
                    data.koleksi.forEach(item => {
                        let li = document.createElement('li');
                        li.innerText = item;
                        list.appendChild(li);
                    });
                })
                .catch(err => console.error("Gagal load data:", err));
        }

        function tambahBuku() {
            const input = document.getElementById('book-input');
            if(!input.value) return;

            fetch(`${API_URL}/add-book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item: input.value })
            })
            .then(res => res.json())
            .then(() => {
                input.value = "";
                loadData();
            });
        }

        loadData();
    </script>
</body>
</html>
